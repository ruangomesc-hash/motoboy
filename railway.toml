# Railway — worker WhatsApp (apps/api)
# https://docs.railway.com/guides/config-as-code

[build]
builder = "RAILPACK"
buildCommand = "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm db:generate && pnpm --filter @motoboy/api build"

[build.env]
NODE_VERSION = "20"
NIXPACKS_NODE_VERSION = "20"

[deploy]
startCommand = "pnpm --filter @motoboy/api start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
