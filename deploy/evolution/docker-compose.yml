services:
  evolution-postgres:
    image: postgres:16-alpine
    container_name: motoboy_evolution_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_PG_PASSWORD:-evolution}
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-redis:
    image: redis:7-alpine
    container_name: motoboy_evolution_redis
    restart: unless-stopped
    volumes:
      - evolution_redis_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: motoboy_evolution
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      SERVER_URL: ${EVOLUTION_SERVER_URL}
      CONFIG_SESSION_PHONE_VERSION: ""
      LOG_LEVEL: ERROR
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_PG_PASSWORD:-evolution}@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: motoboy_evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/2
      CACHE_REDIS_PREFIX_KEY: motoboy_evolution
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:
  evolution_pg_data:
  evolution_redis_data:
